# Azure Pipelines CI/CD for Dobeu Undertaker
# This pipeline builds, tests, and publishes the undertaker package and container image

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
  paths:
    exclude:
      - docs/*
      - "*.md"

pr:
  branches:
    include:
      - main
      - develop

variables:
  - name: pythonVersion
    value: "3.11"
  - name: imageName
    value: "dobeu-undertaker"
  - name: containerRegistry
    value: "dobeuacr.azurecr.io"
  - group: dobeu-secrets  # Variable group with secrets

stages:
  # ==========================================================================
  # Stage: Build and Test
  # ==========================================================================
  - stage: Build
    displayName: "Build and Test"
    jobs:
      - job: Test
        displayName: "Run Tests"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
            displayName: "Use Python $(pythonVersion)"

          - script: |
              curl -sSL https://install.python-poetry.org | python3 -
              echo "##vso[task.prependpath]$HOME/.local/bin"
            displayName: "Install Poetry"

          - script: |
              poetry install
            displayName: "Install Dependencies"

          - script: |
              poetry run ruff check src/
              poetry run ruff format --check src/
            displayName: "Lint Code"

          - script: |
              poetry run pyright src/
            displayName: "Type Check"

          - script: |
              poetry run pytest --cov=dobeu_undertaker --cov-report=xml --cov-report=html --junitxml=junit.xml
            displayName: "Run Tests"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "junit.xml"
            condition: succeededOrFailed()
            displayName: "Publish Test Results"

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: "Cobertura"
              summaryFileLocation: "coverage.xml"
              reportDirectory: "htmlcov"
            displayName: "Publish Coverage"

      - job: Security
        displayName: "Security Scan"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: |
              pip install pip-audit safety bandit
            displayName: "Install Security Tools"

          - script: |
              pip-audit --requirement requirements.txt || true
            displayName: "Dependency Vulnerability Scan"
            continueOnError: true

          - script: |
              bandit -r src/ -f json -o bandit-report.json || true
            displayName: "Static Security Analysis"
            continueOnError: true

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: "bandit-report.json"
              artifactName: "security-reports"
            condition: always()

  # ==========================================================================
  # Stage: Build Container
  # ==========================================================================
  - stage: BuildContainer
    displayName: "Build Container"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Docker
        displayName: "Build Docker Image"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: "AzureContainerRegistry"
              repository: "$(imageName)"
              command: "build"
              Dockerfile: "Dockerfile"
              tags: |
                $(Build.BuildId)
                $(Build.SourceBranchName)
                latest
            displayName: "Build Image"

          - task: Docker@2
            inputs:
              containerRegistry: "AzureContainerRegistry"
              repository: "$(imageName)"
              command: "push"
              tags: |
                $(Build.BuildId)
                $(Build.SourceBranchName)
            displayName: "Push Image"
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  # ==========================================================================
  # Stage: Deploy to Staging
  # ==========================================================================
  - stage: DeployStaging
    displayName: "Deploy to Staging"
    dependsOn: BuildContainer
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployStaging
        displayName: "Deploy to Staging Environment"
        pool:
          vmImage: "ubuntu-latest"
        environment: "staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(imageName):$(Build.BuildId) to staging"
                    # Add deployment commands here
                  displayName: "Deploy to Staging"

  # ==========================================================================
  # Stage: Deploy to Production
  # ==========================================================================
  - stage: DeployProduction
    displayName: "Deploy to Production"
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProduction
        displayName: "Deploy to Production Environment"
        pool:
          vmImage: "ubuntu-latest"
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(imageName):$(Build.BuildId) to production"
                    # Add deployment commands here
                  displayName: "Deploy to Production"
