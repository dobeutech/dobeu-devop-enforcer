# docker-compose.datadog.yml — Datadog Agent sidecar
# Auto-generated by Dobeu Automation Architect
# Merge with existing docker-compose: docker compose -f docker-compose.yml -f docker-compose.datadog.yml up
# Required env: DD_API_KEY (set in .env or CI secret)

services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: dd-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=datadoghq.com
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_ENV=${DD_ENV:-production}
      - DD_TAGS=team:dobeutech
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"
      - "8125:8125"
    restart: unless-stopped
