# Dobeu Python Standards
# Standards specific to Python projects
# Inherits from: dobeu-base
# Version: 1.0.0

name: dobeu-python
version: "1.0"
description: Python-specific standards for Dobeu Tech Solutions
inherits:
  - dobeu-base

# Python-specific standards (override/extend base)
standards:
  # Formatting (Black/Ruff compatible)
  line_length: 100
  indent_size: 4
  quote_style: double

  # Python version requirements
  min_python_version: "3.11"

  # Type hints
  require_type_hints: true
  strict_type_checking: false  # pyright strict mode

  # Docstrings
  docstring_style: google  # google, numpy, sphinx
  require_module_docstrings: true
  require_class_docstrings: true
  require_function_docstrings: true  # public functions only

# Required Python files
required_files:
  python:
    - pyproject.toml
    - py.typed  # for typed packages

# Recommended files (warnings if missing)
recommended_files:
  - requirements.txt  # or poetry.lock
  - .pre-commit-config.yaml
  - tox.ini  # or nox.py

# Import ordering (isort compatible)
import_order:
  sections:
    - FUTURE
    - STDLIB
    - THIRDPARTY
    - FIRSTPARTY
    - LOCALFOLDER
  known_first_party:
    - dobeu_undertaker
  force_single_line: false
  lines_after_imports: 2

# Linting configuration (ruff)
linting:
  tool: ruff
  select:
    - E      # pycodestyle errors
    - W      # pycodestyle warnings
    - F      # Pyflakes
    - I      # isort
    - B      # flake8-bugbear
    - C4     # flake8-comprehensions
    - UP     # pyupgrade
    - ARG    # flake8-unused-arguments
    - SIM    # flake8-simplify
    - TCH    # flake8-type-checking
    - PTH    # flake8-use-pathlib
    - PL     # Pylint
    - RUF    # Ruff-specific
  ignore:
    - PLR0913  # too many arguments
    - PLR2004  # magic value comparison

# Testing configuration
testing:
  framework: pytest
  coverage_tool: pytest-cov
  min_coverage: 80
  coverage_fail_under: true
  required_markers:
    - unit
    - integration
    - slow

# Project structure preferences
project_structure:
  prefer_src_layout: true
  tests_location: tests/  # tests/ at root
  docs_location: docs/

# Packaging
packaging:
  build_backend: poetry.core.masonry.api
  require_version_file: false  # use dynamic versioning
